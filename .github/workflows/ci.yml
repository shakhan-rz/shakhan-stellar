name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    name: Smart contract — test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      # Cache the registry and target dir so later runs don't rebuild
      # the whole soroban-sdk tree from scratch.
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run contract tests
        run: cargo test --locked

      - name: Build contract wasm
        run: cargo build --locked --target wasm32v1-none --release

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          # 22, not 20: vite 8 and jsdom 29 (pulled in by vitest) require
          # >=20.19, and Node 20 went end-of-life in April 2026.
          node-version: 22
          cache: npm

      - name: Show toolchain
        run: node -v && npm -v

      - name: Install dependencies
        run: |
          set +e
          out=$(npm ci 2>&1)
          code=$?
          echo "$out"
          if [ $code -ne 0 ]; then
            # Repo logs need a sign-in to read; annotations do not. Echo the
            # tail of the failure as an annotation so it is diagnosable.
            echo "::error::npm ci failed:%0A$(echo "$out" | tail -40 | sed 's/%/%25/g; s/\r/ /g' | awk '{printf "%s%%0A", $0}')"
          fi
          exit $code

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
